{% extends 'base.html' %}
{% block title %}Change Admin Password{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-key me-2"></i>Change Admin Password</h2>
</div>

<div class="row">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <input type="password" name="current_password" class="form-control"
                   placeholder="Enter current password" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password" class="form-control"
                   placeholder="Enter new password" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control"
                   placeholder="Repeat new password" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">
              <i class="bi bi-check-lg me-1"></i>Change Password
            </button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
