<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Association Kalamela Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .login-card { max-width: 400px; margin: 10vh auto; }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card card shadow-sm">
    <div class="card-header bg-dark text-white text-center py-3">
      <i class="bi bi-trophy-fill text-warning me-2"></i>
      <strong>LKC Kalamela Portal</strong>
      <div class="small text-white-50 mt-1">Administrator Login</div>
    </div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Admin Password</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="Enter admin password" autofocus required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-dark btn-lg">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login
          </button>
        </div>
      </form>
    </div>
    <div class="card-footer text-center text-muted small py-2">
      <a href="{{ url_for('main.dashboard') }}" class="text-muted">
        <i class="bi bi-arrow-left me-1"></i>Back to public view
      </a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
